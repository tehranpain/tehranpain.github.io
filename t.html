    // 4. 初始化点聚合图层（核心优化：仅严重重叠时聚合，允许小部分重叠）
    const markers = L.markerClusterGroup({
      // 自定义聚合簇样式（红色圆形，显示数量）
      iconCreateFunction: function(cluster) {
        const count = cluster.getChildCount();
        return L.divIcon({
          html: `<div style="background:#ff4444; color:white; border-radius:50%; width:40px; height:40px; line-height:40px; text-align:center; font-weight:bold; font-size:14px;">${count}</div>`,
          className: 'custom-cluster',
          iconSize: L.point(40, 40)
        });
      },
      spiderfyOnMaxZoom: true,  // 最大缩放时展开所有重叠点
      showCoverageOnHover: false, // 悬停不显示覆盖区域
      // ✅ 核心优化：把聚合半径从50调小到25，仅严重重叠（>50%）时才聚合
      maxClusterRadius: 10
    });

    // 5. 批量添加歌手标记到聚合图层
    singers.forEach(singer => {
      const icon = L.icon({
        iconUrl: singer.avatar,
        iconSize: [50, 50],
        iconAnchor: [25, 25],
        popupAnchor: [0, -35]
      });

      const marker = L.marker([singer.lat, singer.lng], { icon: icon });
      
      // 弹窗内容（和你原有样式一致）
      const popupContent = `
        <div style="display:flex; align-items:center; gap:12px;">
          <img src="${singer.avatar}" 
               style="width:70px; height:70px; border-radius:50%; object-fit:cover;" 
               alt="${singer.name}">
          <div>
            <div style="font-weight:bold; font-size:18px; margin-bottom:4px;">${singer.name}</div>
            <div style="color:#555;">粉丝数：${singer.fans}</div>
          </div>
        </div>
      `;
      marker.bindPopup(popupContent);
      
      // 加入聚合图层（而非直接加map）
      markers.addLayer(marker);
    });

    // 6. 把聚合图层添加到地图
    map.addLayer(markers);
  </script>
